nd agents accelerate it?"},{title:"Strategic Priorities Alignment",desc:"Which existing strategic priorities does this accelerate — and how is that measured in board-visible terms?"},{title:"Executive Override Authority",desc:"What is the organisation's executive override authority — and when does it trigger?"}],tags:["Org strategy integration","Strategic coherence","Non-delegable decisions","Executive override authority","Accountability boundaries"]}]},{tier:"Domain 1 · Readiness — what must be true before you deploy anything",cards:[{num:"1.1",title:"Capability Assessment",desc:"Honest audit of internal skills, data maturity, integration complexity, and budget. Determines which implementation path is realistic — not which one is aspirational.",color:"blue",tags:["Skills audit","Data maturity","Integration complexity","Budget realism"]},{num:"1.2",title:"Deployment Maturity Model — Crawl, Walk, Run",desc:"Low-risk tasks under full human review first. Success gates before progression. Autonomy is earned, not granted.",color:"teal",phases:[{l:"Crawl",d:"Low-risk tasks, full human review on all outputs"},{l:"Walk",d:"Medium-risk operational work, human-on-the-loop oversight"},{l:"Run",d:"Proven use cases with defined blast radius and circuit breakers"}],tags:["Success gates","Risk-based progression","Autonomy earned not granted"]},{num:"1.3",title:"Change & Culture Readiness",desc:"The programme fails or succeeds on whether people change how they work. Map resistance patterns. Shift people from operators of AI to governors of AI — curators of judgment, not just users of tools.",color:"pink",cultureBlocks:[{title:"Resistance mapping",desc:"Identify resistance patterns early; address staff whose expertise is being codified by agents"},{title:"Skill shift",desc:"Move people from AI operators to AI governors — curators of judgment, not users of tools"},{title:"Cultural readiness",desc:"Build a continuous learning culture where AI is embedded in daily work, not bolted on the side"}],tags:["AI champions network","Role-based training","Adoption tracking","RACI per domain"]},{num:"1.4",title:"Procurement & Third-Party Agent Governance",desc:"Most enterprises will buy agents before they build them. Vendor agent due diligence, model provenance, SBOM-equivalent for agent stacks, contractual rights to audit and withdraw.",color:"purple",tags:["Vendor due diligence","Model provenance","Agent SBOM","Audit & withdrawal rights"]}]},{tier:"Domain 2 · Control — who is accountable, and how decisions are made visible",cards:[{num:"2.1",title:"Named Accountability",desc:"Every agentic system has a named human owner accountable for its operation, outcomes, and shutdown authority. Accountability chains across agent, domain, and enterprise levels — with clear escalation paths when thresholds are exceeded.",color:"blue",tags:["Named system owners","Accountability chain","Shutdown authority","No anonymous ownership"]},{num:"2.2",title:"Decision Transparency",desc:"The reasoning behind every agent decision — inputs, logic, rules applied — must be interpretable and challengeable by a human. Explainability is not optional for material decisions.",color:"purple",diff:[{l:"Covers: the reasoning",d:"Inputs, logic, rules applied behind every material decision",bg:"#eeedfe",tc:"#3c3489"},{l:"Not this: the actor",d:"Who performed the action — that belongs in 2.3",bg:"#e1f5ee",tc:"#085041"}]},{num:"2.3",title:"Agent Identity & Traceability",desc:"Every agent has a verifiable cryptographic identity. Every action is logged, timestamped, and attributable. Cross-agent audit trail when agents hand off tasks to each other.",color:"teal",tags:["Cryptographic identity","Timestamped action logs","Cross-agent audit trail","Task handoff traceability"]},{num:"2.4",title:"Human Oversight Modes",desc:"Not one mode — three, applied by risk tier. The choice of oversight mode is itself a governed decision.",color:"blue",oversightModes:[{l:"Human-in-the-loop",d:"Human approves each action. High-stakes, irreversible, customer-facing decisions.",bg:"#fee2e2",tc:"#7f1d1d"},{l:"Human-on-the-loop",d:"Human monitors and can intervene. Medium-risk operational work.",bg:"#fef3c7",tc:"#78350f"},{l:"Human-in-command",d:"Human sets policy and audits post-hoc. Low-risk, high-volume, reversible tasks.",bg:"#dcfce7",tc:"#14532d"}],tags:["Risk-tiered oversight","Oversight mode governance"]},{num:"2.5",title:"Escalation & Intervention Model",desc:"Accountability must activate under pressure. Defined triggers, clear escalation paths, and predefined intervention actions. If escalation is undefined, accountability fails at the moment it is needed most.",color:"red",escalationBlocks:[{title:"Escalation triggers",desc:"Blast radius exceeded, cost anomaly, confidence breach, ethical threshold hit"},{title:"Escalation path",desc:"Agent owner → domain owner → enterprise authority"},{title:"Intervention actions",desc:"Pause, rollback, shutdown, human override — predefined before deployment"}],tags:["Escalation triggers","Intervention playbook","Override authority"]}]},{tier:"Domain 3 · Agentic-Native Controls — problems single-agent governance cannot solve",cards:[{num:"3.1",title:"Multi-Agent Orchestration",desc:"When agents invoke other agents, delegate tasks, and negotiate — governance shifts from 'is this agent safe' to 'is this system of agents safe.' Rules of engagement between agents, task delegation boundaries, emergent behaviour detection, cascade failure containment.",color:"purple",tags:["Agent rules of engagement","Delegation boundaries","Emergent behaviour detection","Cascade failure containment"]},{num:"3.2",title:"Action Blast-Radius Governance",desc:"Agents execute — they send emails, move funds, deploy code. Every tool an agent can invoke must have a defined blast radius: maximum damage if misused, reversibility window, escalation trigger above a threshold. Blast radius thresholds directly link to escalation authority.",color:"red",tags:["Blast radius per tool","Reversibility window","Tiered tool authorisation","Escalation threshold"]},{num:"3.3",title:"Memory & Context Governance",desc:"Agents accumulate memory across sessions. Who decides what gets persisted? How is poisoned or manipulated memory detected and purged? What is the retention policy and right-to-forget mechanism for customer data held in agent memory?",color:"amber",tags:["Memory persistence policy","Poisoned memory detection","Retention & purge policy","Right to forget"]},{num:"3.4",title:"Resource & Cost Governance",desc:"Agentic systems can enter infinite loops, runaway token spend, recursive self-invocation. One misconfigured agent can run six figures in a weekend. Hard limits on spend, compute, and API calls per agent. Circuit breakers. Budget ownership at agent level, not platform level.",color:"amber",tags:["Hard spend limits","Circuit breakers","Per-agent budget ownership","Runaway prevention"]},{num:"3.5",title:"Agent Lifecycle Management",desc:"Version control, deprecation, rollback. When an agent is retired — what happens to its memory, its pending tasks, its downstream dependencies? Most firms cannot answer this today.",color:"elec",tags:["Version control","Deprecation policy","Rollback capability","Dependency mapping"]}]},{tier:"Domain 4 · Trust — making the outputs defensible",cards:[{num:"4.1",title:"Security & Risk Management",desc:"Treat agents as enterprise assets with defined threat models. Apply the five security disciplines to a new asset class: identify, protect, detect, respond, recover.",color:"red",nist:[{l:"Identify risks & assets",bg:"#e6f1fb",tc:"#0c447c"},{l:"Protect access & data",bg:"#eaf3de",tc:"#27500a"},{l:"Detect anomalies & threats",bg:"#faeeda",tc:"#633806"},{l:"Respond & contain",bg:"#fcebeb",tc:"#791f1f"},{l:"Recover & improve",bg:"#e1f5ee",tc:"#085041"}],tags:["Threat modelling","Least privilege","Agent misuse controls","Incident response","Business continuity"]},{num:"4.2",title:"Data Privacy & Governance",desc:"Agents access only the data they need. All outputs traceable to source data. Human approval for sensitive or customer-facing content. Privacy-by-design at the prompt and retrieval layer — not bolted on after.",color:"dblue",tags:["Data minimisation","Privacy-by-design","Output traceability","Prompt layer privacy"]},{num:"4.3",title:"Output Integrity — Bias, Fairness & Hallucination",desc:"Actively govern quality, honesty, and fairness. Test for bias against defined fairness thresholds. Ground outputs in verified sources. Flag low-confidence results for review. Red-team adversarially before deployment and on a cadence after.",color:"amber",mitigationBlocks:[{title:"Bias detection & fairness testing",bg:"#eeedfe",tc:"#3c3489"},{title:"Hallucination detection & grounding",bg:"#faeeda",tc:"#633806"},{title:"Output safeguards & guardrails",bg:"#fcebeb",tc:"#791f1f"},{title:"Structured workflows & constrained scope",bg:"#e1f5ee",tc:"#085041"}],tags:["Fairness thresholds","RAG & source grounding","Output validation","Red-teaming & adversarial testing","Confidence scoring"],sourceNote:"Source: Mitigation Strategies for Errors in Agentic AI Systems"}]},{tier:"Domain 5 · Assurance — proving it works, continuously",cards:[{num:"5.1",title:"Reliability & Bounded Behaviour",desc:"Agents behave consistently within defined boundaries — don't drift beyond scope, don't degrade silently, produce reproducible results where required. Fallback mechanisms when confidence drops below threshold.",color:"elec",tags:["Consistent outputs","Defined agent boundaries","Fallback mechanisms","No silent drift"]},{num:"5.2",title:"Sandbox Testing",desc:"Edge cases, failure modes, and adversarial scenarios tested in controlled environments before production. Not a one-time gate — a continuous discipline as models and prompts evolve.",color:"elec",tags:["Edge case testing","Failure mode analysis","Adversarial scenarios","Continuous not once-off"]},{num:"5.3",title:"KPI & Continuous Monitoring",desc:"Real-time tracking of accuracy, hallucination rate, adoption, drift, cost per decision, and risk indicators. Monitoring is the primary trigger mechanism for accountability — metrics must be tied to escalation thresholds and responsible owners.",color:"elec",tags:["Accuracy rate","Hallucination rate","Cost per decision","Drift detection","Escalation-linked metrics"]},{num:"5.4",title:"Regulatory Compliance",desc:"Classify each agent by risk tier. Document controls against applicable obligations. Maintain audit trail sufficient to demonstrate due care. EU AI Act, ISO 42001, and NIST AI RMF are reference standards these actions satisfy — not substitutes for the actions themselves.",color:"elec",tags:["Risk-tiered classification","Audit trail","EU AI Act","ISO 42001","NIST AI RMF"]}]},{tier:"Domain 6 · Value Realisation — separating governance-as-control from governance-as-strategy",cards:[{num:"6",title:"Value Realisation Model",desc:"If AI does not change decision quality, speed, or cost — it is not transformation. It is expensive software with a governance overhead. Governance teams that cannot report value realisation become cost centres. Governance teams that can report it become strategic advisors to the CEO.",color:"green",wide:!0,valueBlocks:[{title:"Decision economics",desc:"Cost of wrong decisions before vs after AI. Time-to-decision reduction. Decision quality improvement over time. Each agent must demonstrate measurable impact against defined baseline."},{title:"Operational value",desc:"Headcount required to scale. Manual effort eliminated. Revenue per automated decision. Margin impact of automation."},{title:"Transformation progress",desc:"% of functions AI-native vs AI-assisted. Rate of autonomy progression. Are we transforming, or running expensive pilots indefinitely?"}],tags:["Cost per decision","Time-to-decision","Decision quality score","Margin impact","Automation rate","Business case ROI","Baseline performance","Re-scope or retire"]}]}],f={blue
